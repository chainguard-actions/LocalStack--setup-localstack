name: Test LocalStack setup with ephemeral backend and save action
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup LocalStack with ephemeral backend (save)
        id: action
        uses: .
        with:
          image-tag: 'latest'
          install-awslocal: 'true'
          skip-startup: 'false'
          skip-wait: 'false'
          configuration: ''
          ci-project: ''
          github-token: ''
          preview-cmd: 'echo "preview $AWS_ENDPOINT_URL"'
          include-preview: 'true'
          state-name: 'my-ephemeral-state'
          state-action: 'save'
          state-backend: 'ephemeral'
          auto-load-pod: ''
          extension-auto-install: ''
          lifetime: '30'

      - name: Assert awslocal is installed
        run: |
          if ! command -v awslocal &>/dev/null; then
            echo "FAIL: awslocal not found in PATH"
            exit 1
          fi
          echo "PASS: awslocal is installed"
