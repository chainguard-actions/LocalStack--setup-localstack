name: Test ephemeral state with preview inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Test action with ephemeral state inputs
        id: action
        continue-on-error: true
        uses: .
        with:
          image-tag: 'latest'
          install-awslocal: 'false'
          skip-startup: 'true'
          state-action: 'start'
          state-backend: 'ephemeral'
          state-name: 'my-test-state'
          preview-cmd: 'echo preview at $AWS_ENDPOINT_URL'
          include-preview: 'true'
          github-token: 'fake-token'
          ci-project: 'test-project'
          lifetime: '30'
      - name: Assert action step was reached
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          echo "PASS: action step was reached with ephemeral state inputs"
